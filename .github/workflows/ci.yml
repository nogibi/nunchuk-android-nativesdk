name: Build nativesdk

on:
  push:
    branches: [ "*" ]
    tags:     [ "*" ]
  pull_request:
  workflow_dispatch:
    inputs:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Override submodule URL
        run: |
          git config -f .gitmodules submodule.src/main/native/libnunchuk.url https://github.com/nunchuk-io/libnunchuk
          git submodule sync
          git submodule update --init --recursive --depth 1

      - name: Prepare dependency cache key
        run: |
          mkdir -p .github/cache-keys
          {
            git -C src/main/native/libnunchuk submodule status --recursive
            sha256sum Dockerfile
            sha256sum src/main/native/.install_deps.sh
            sha256sum src/main/native/patches/*
          } > .github/cache-keys/libnunchuk-deps.txt

      - name: Cache libnunchuk dependencies
        uses: actions/cache@v4
        with:
          path: |
            src/main/native/libnunchuk/contrib/bitcoin/depends/built
            src/main/native/libnunchuk/contrib/bitcoin/depends/sources
            src/main/native/libnunchuk/contrib/bitcoin/depends/work
            src/main/native/libnunchuk/contrib/bitcoin/depends/aarch64-linux-android
            src/main/native/libnunchuk/contrib/bitcoin/depends/armv7a-linux-androideabi
            src/main/native/libnunchuk/contrib/openssl/aarch64-linux-android
            src/main/native/libnunchuk/contrib/openssl/armv7a-linux-androideabi
          key: ${{ runner.os }}-libnunchuk-deps-${{ hashFiles('.github/cache-keys/libnunchuk-deps.txt') }}

      - name: Prepare Android cache key
        run: |
          mkdir -p .github/cache-keys
          {
            git ls-files -z -- \
              '*.gradle' \
              'gradle.properties' \
              'gradle/wrapper/gradle-wrapper.properties' \
              'configs' \
              'src/main/AndroidManifest.xml' \
              'src/main/java' \
              'src/main/kotlin' \
              'src/main/res' \
              'src/main/native' \
              ':(exclude)src/main/native/libnunchuk' |
              sort -z |
              xargs -0 -r sha256sum
            git -C src/main/native/libnunchuk rev-parse HEAD
            git -C src/main/native/libnunchuk submodule status --recursive
          } > .github/cache-keys/android-build.txt

      - name: Cache Android build
        uses: actions/cache@v4
        with:
          path: |
            .gradle-cache/caches
            .gradle-cache/wrapper
            .gradle
            .cxx
            build/generated
            build/intermediates
            build/kotlin
            build/tmp
          key: ${{ runner.os }}-android-build-${{ hashFiles('.github/cache-keys/android-build.txt') }}
          restore-keys: |
            ${{ runner.os }}-android-build-

      - name: Cache C/C++ compiler outputs
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('.github/cache-keys/android-build.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push builder image
        working-directory: ${{ github.workspace }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile \
            -t ghcr.io/${{ github.repository }}/nunchuk-builder \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository }}/builder-cache \
            --cache-to   type=registry,ref=ghcr.io/${{ github.repository }}/builder-cache,mode=max \
            --push .

      - name: Install dependencies
        run: |
          docker run  --rm \
            -v ${{ github.workspace }}:/nunchuk-android-nativesdk \
            -w /nunchuk-android-nativesdk/src/main/native \
            ghcr.io/${{ github.repository }}/nunchuk-builder \
            bash ./.install_deps.sh

      - name: Build the sdk
        run: |
          docker run  --rm \
            -v ${{ github.workspace }}:/nunchuk-android-nativesdk \
            -e GRADLE_USER_HOME=/nunchuk-android-nativesdk/.gradle-cache \
            -e CCACHE_DIR=/nunchuk-android-nativesdk/.ccache \
            -e CCACHE_BASEDIR=/nunchuk-android-nativesdk \
            -e CCACHE_COMPILERCHECK=content \
            -e CCACHE_NOHASHDIR=true \
            -e CCACHE_MAXSIZE=2G \
            -e CCACHE_EXECUTABLE=ccache \
            -w /nunchuk-android-nativesdk \
            ghcr.io/${{ github.repository }}/nunchuk-builder \
            ./gradlew --build-cache assembleArmRelease

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nativesdk-${{ github.sha }}
          path: build/outputs/aar
